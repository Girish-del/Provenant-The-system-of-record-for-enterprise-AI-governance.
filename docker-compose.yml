# Local development stack for Aegis.
#   docker compose up -d      # start Postgres, Redis, LocalStack (S3)
#   docker compose down       # stop (keeps data)
#   docker compose down -v    # stop and wipe data
# Matches the env defaults in .env.example.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Fake AWS S3 for evidence/exports in dev (no real AWS account needed).
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-central-1
    ports:
      - "4566:4566"
    volumes:
      - localstack:/var/lib/localstack

volumes:
  pgdata:
  localstack:

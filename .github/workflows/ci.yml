name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck / Lint / Test / Build / E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aegis
          POSTGRES_PASSWORD: aegis
          POSTGRES_DB: aegis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aegis -d aegis"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      localstack:
        image: localstack/localstack:3
        env:
          SERVICES: s3
          DEFAULT_REGION: eu-central-1
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15

    env:
      # Migrations + RLS setup run as the owner role.
      DIRECT_URL: postgresql://aegis:aegis@localhost:5432/aegis

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # db scripts load ../../.env via dotenv-cli; give CI an empty one so the
      # flag never points at a missing file (CI env vars still take precedence).
      - name: Create empty .env for dotenv-cli
        run: touch .env

      - name: Dependency audit (advisory)
        continue-on-error: true
        run: pnpm audit --audit-level high

      - name: Generate Prisma client
        run: pnpm --filter @aegis/db exec prisma generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Set up database (schema + RLS)
        env:
          DATABASE_URL: postgresql://aegis:aegis@localhost:5432/aegis
        run: |
          pnpm --filter @aegis/db exec prisma db push --skip-generate --accept-data-loss
          pnpm --filter @aegis/db rls:apply

      - name: Test (unit + tenant-isolation + API integration suites)
        env:
          # App connects as the non-superuser role so RLS is actually exercised.
          DATABASE_URL: postgresql://aegis_app:aegis_app@localhost:5432/aegis
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: ci-only-insecure-0123456789abcdefghijklmn
        # Exclude @aegis/e2e here: it needs apps/api built (dist/main.js) and runs
        # in its own step after Build. `pnpm test` would otherwise run it pre-build.
        run: pnpm exec turbo run test --filter=!@aegis/e2e

      - name: Build
        run: pnpm build

      - name: E2E (full governance pipeline)
        env:
          CI: 'true'
        run: pnpm --filter @aegis/e2e test

  ai-service:
    name: AI service (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Test
        run: uv run --directory services/ai pytest -q

  security:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
